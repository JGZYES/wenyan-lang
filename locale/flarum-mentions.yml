        user_mentioned:
            subject: '{mentioner_display_name} 在 {title} 中提及了你'
            body: "嘿 {recipient_display_name}！\n\n{mentioner_display_name} 在 {title} 的一篇帖子中提及了你。\n\n{url}\n\n---\n\n{content}\n"
        group_mentioned:
            subject: '{mentioner_display_name} 在 {title} 中提及了你所属的用户组'
            body: "嘿 {recipient_display_name}！\n\n{mentioner_display_name} 在 {title} 中提及了你所属的用户组。\n\n{url}\n\n---\n\n{content}\n"
            